<div class="home-hero">
  <div class="hero-card">
    <h1 class="title">Welcome to Rima's App</h1>
    <p class="subtitle">Log in to continue to your dashboard.</p>

    
    <p class="success-message" *ngIf="loginSuccess">
      {{ message }}
    </p>

    
    <p class="error-message" *ngIf="!loginSuccess && message">
      {{ message }}
    </p>

    <form class="auth-form" (submit)="onSubmit($event)">
      <div class="form-row">
        <label class="sr-only">Email</label>
        <input
          name="email"
          type="email"
          required
          placeholder="Email"
          [(ngModel)]="user.email"
        />
      </div>

      <div class="form-row">
        <label class="sr-only">Password</label>
        <input
          name="password"
          type="password"
          required
          placeholder="Password"
          [(ngModel)]="user.password"
        />
      </div>

      <div class="actions">
        <button 
        type="submit"
         class="btn btn-primary"
         >
         Login
        </button>
        
        <button
          type="button"
          class="btn btn-secondary"
          (click)="goToSignup()"
        >
          Sign Up
        </button>
      </div>
    </form>
  </div>
</div>
